<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS TiendaRonald</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            #areaImpresion, #areaImpresion * { visibility: visible; }
            #areaImpresion { 
                position: absolute; left: 0; top: 0; width: 100%; 
                display: block !important; color: black !important; background: white;
            }
        }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans">

    <div id="areaImpresion" class="hidden text-black p-8 font-mono bg-white text-left">
        <div class="text-center border-b-2 border-dashed border-black pb-4 mb-4">
            <h1 class="text-2xl font-bold">TiendaRonald</h1>
            <p class="text-sm">CELULAR: +591 63653911</p>
        </div>
        <div class="space-y-2 text-lg">
            <p><b>FECHA:</b> <span id="printFecha"></span></p>
            <p><b>MODELO:</b> <span id="printModelo"></span></p>
            <p><b>IMEI:</b> <span id="printImei"></span></p>
            <div class="border-t-2 border-dashed border-black mt-4 pt-4 text-2xl font-bold flex justify-between">
                <span>TOTAL:</span>
                <span id="printMonto"></span>
            </div>
        </div>
        <p class="text-center mt-10 italic">¡Gracias por su compra!</p>
    </div>

    <div id="loginScreen" class="flex flex-col items-center justify-center h-screen">
        <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl border border-slate-700 w-80 text-center">
            <h1 class="text-2xl font-bold mb-2 text-blue-400 italic italic">TiendaRonald</h1>
            <div id="tasaDia" class="text-yellow-400 mb-6 font-mono text-xs font-bold bg-yellow-400/10 p-2 rounded italic text-center">Sincronizando con Google...</div>
            <button onclick="abrirVendedor()" class="w-full bg-green-600 p-4 rounded-xl mb-3 font-bold hover:bg-green-700 transition shadow-lg">VENDEDOR</button>
            <button onclick="abrirJefe()" class="w-full bg-blue-600 p-4 rounded-xl font-bold hover:bg-blue-700 transition shadow-lg">JEFE / DUEÑO</button>
        </div>
    </div>

    <div id="vendedorView" class="hidden p-4 max-w-md mx-auto">
        <div class="bg-white text-slate-900 p-5 rounded-3xl shadow-2xl space-y-4">
            <h2 class="text-xl font-black text-green-600 text-center uppercase tracking-tighter">Nueva Venta</h2>
            <div class="relative">
                <input type="text" id="busqueda" onkeyup="buscarStock()" class="w-full border-2 p-3 rounded-xl outline-none focus:border-green-500 bg-slate-50" placeholder="🔍 Buscar por modelo o IMEI...">
                <div id="listaSugerencias" class="absolute z-10 w-full bg-white max-h-60 overflow-y-auto rounded-xl shadow-xl border mt-1"></div>
            </div>
            <div id="detallesEquipo" class="p-4 bg-blue-50 text-blue-800 rounded-2xl text-center text-sm font-bold border-2 border-blue-100 italic text-left">Seleccione un equipo de la lista</div>
            <div class="flex gap-2">
                <button onclick="setMoneda('USD')" id="btnUSD" class="flex-1 p-3 rounded-xl font-bold bg-green-600 text-white shadow-md">USD $</button>
                <button onclick="setMoneda('BS')" id="btnBS" class="flex-1 p-3 rounded-xl font-bold bg-slate-200 text-slate-600">Bs.</button>
            </div>
            <input type="number" id="precioVenta" oninput="calcularTotal()" class="w-full border-b-4 border-blue-600 p-4 text-3xl font-black text-center text-blue-700 outline-none" placeholder="0.00">
            <div class="bg-slate-900 p-4 rounded-2xl flex justify-between items-center shadow-inner">
                <span class="text-xs text-slate-400 font-bold uppercase tracking-widest">Eq. Cambio:</span>
                <span id="labelEquivalente" class="text-yellow-400 font-bold text-lg">0.00</span>
            </div>
            <button onclick="confirmarVenta()" id="btnVenta" class="w-full bg-green-600 text-white p-5 rounded-2xl font-black shadow-lg uppercase hover:bg-green-700 transition">Finalizar Venta</button>
            <button onclick="location.reload()" class="w-full text-slate-400 text-xs font-bold py-2 text-center underline">Volver al inicio</button>
        </div>
    </div>

    <div id="jefeView" class="hidden p-4 max-w-lg mx-auto">
        <div class="flex justify-between items-center mb-6 text-left">
            <h2 class="text-xl font-bold text-blue-400">PANEL ADMINISTRATIVO</h2>
            <button onclick="location.reload()" class="bg-red-500 px-4 py-2 rounded-xl text-xs font-bold text-white shadow-lg">SALIR</button>
        </div>
        
        <div class="bg-gradient-to-br from-red-600 to-red-800 p-6 rounded-3xl shadow-xl mb-6 text-center text-white">
            <h3 class="text-xs font-bold mb-4 uppercase tracking-widest opacity-80">Finalizar Jornada</h3>
            <button onclick="ejecutarCierre()" id="btnCierre" class="w-full bg-white text-red-700 p-4 rounded-2xl font-black shadow-lg transition">
                <i class="fas fa-file-invoice-dollar mr-2"></i> GENERAR CIERRE EN DRIVE
            </button>
        </div>

        <div class="bg-slate-800 p-5 rounded-3xl border border-yellow-600/30 mb-6 shadow-xl text-left text-left">
            <h3 class="text-yellow-500 text-[10px] font-bold mb-2 uppercase">Tipo de Cambio</h3>
            <div class="flex gap-2">
                <input type="number" id="nuevaTasa" class="bg-slate-700 p-4 rounded-2xl w-full text-white font-bold outline-none border border-slate-600" placeholder="Ej: 12.80">
                <button onclick="guardarTasa()" class="bg-yellow-600 px-8 rounded-2xl font-bold text-white uppercase shadow-lg text-left">OK</button>
            </div>
        </div>

        <div class="bg-slate-800 p-6 rounded-3xl border border-blue-500/30 shadow-2xl space-y-4 text-left">
            <h3 class="text-blue-400 text-xs font-bold mb-2 uppercase text-center tracking-widest">Carga de Inventario</h3>
            <div class="grid grid-cols-2 gap-3 text-slate-900">
                <input type="text" id="invMarca" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Marca">
                <input type="text" id="invModelo" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Modelo">
                <input type="text" id="invImei" class="p-3 rounded-xl bg-white text-sm font-semibold col-span-2" placeholder="IMEI">
                <input type="number" id="invCosto" class="p-3 rounded-xl bg-white text-sm font-semibold" placeholder="Costo Unit $">
                <input type="number" id="invCantidad" class="p-3 rounded-xl bg-slate-200 font-bold text-center" value="1">
            </div>
            
            <div class="flex flex-col items-center gap-2">
                <button onclick="document.getElementById('inputFoto').click()" class="w-full bg-slate-700 text-white p-4 rounded-2xl border-2 border-dashed border-slate-500 text-xs font-bold hover:bg-slate-600 transition">
                    <i class="fas fa-camera mr-2"></i> TOMAR FOTO DEL EQUIPO
                </button>
                <input type="file" id="inputFoto" accept="image/*" capture="environment" class="hidden" onchange="previsualizarFoto(this)">
                <img id="vistaPrevia" class="hidden w-32 h-32 object-cover rounded-xl border-2 border-blue-500">
            </div>

            <button onclick="cargarInventario()" id="btnCargar" class="w-full bg-blue-600 text-white p-4 rounded-2xl font-black shadow-lg active:scale-95 transition">CARGAR AL STOCK</button>
        </div>
    </div>

    <script>
        const urlScript = "https://script.google.com/macros/s/AKfycbx00-D3CsMT6nGbsjYimQ298eQk76g_mbNPRhuhH6LQt1unCy448LtIZiVxXQWRSiYLBA/exec";
        let stockReal = [];
        let monedaActual = 'USD';
        window.tasaGlobal = 12.50;
        let fotoBase64 = "";

        window.onload = async () => {
            const status = document.getElementById('tasaDia');
            try {
                const resTasa = await fetch(urlScript + "?action=getTasa");
                const tasaVal = await resTasa.text();
                window.tasaGlobal = parseFloat(tasaVal) || 12.50;
                status.innerText = "Tasa Actual: " + window.tasaGlobal + " Bs";
                status.classList.replace('text-yellow-400', 'text-green-400');

                const resInv = await fetch(urlScript + "?action=getInventario");
                stockReal = await resInv.json();
            } catch (e) {
                status.innerText = "⚠️ Error de Conexión (Revisar Permisos)";
                status.classList.replace('text-yellow-400', 'text-red-400');
            }
        };

        function previsualizarFoto(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('vistaPrevia').src = e.target.result;
                    document.getElementById('vistaPrevia').classList.remove('hidden');
                    fotoBase64 = e.target.result;
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function setMoneda(m) {
            monedaActual = m;
            document.getElementById('btnUSD').className = m === 'USD' ? 'flex-1 p-3 rounded-xl font-bold bg-green-600 text-white shadow-md' : 'flex-1 p-3 rounded-xl font-bold bg-slate-200 text-slate-600';
            document.getElementById('btnBS').className = m === 'BS' ? 'flex-1 p-3 rounded-xl font-bold bg-blue-600 text-white shadow-md' : 'flex-1 p-3 rounded-xl font-bold bg-slate-200 text-slate-600';
            calcularTotal();
        }

        function calcularTotal() {
            const monto = document.getElementById('precioVenta').value;
            const label = document.getElementById('labelEquivalente');
            if(!monto) { label.innerText = "0.00"; return; }
            label.innerText = monedaActual === 'USD' ? (monto * window.tasaGlobal).toFixed(2) + " Bs" : (monto / window.tasaGlobal).toFixed(2) + " $ USD";
        }

        function buscarStock() {
            const busq = document.getElementById('busqueda').value.toLowerCase();
            const sug = document.getElementById('listaSugerencias');
            sug.innerHTML = "";
            if (busq.length < 1) return;
            const filtrados = stockReal.filter(i => i.modelo.toLowerCase().includes(busq) || i.imei.toString().includes(busq));
            filtrados.forEach(i => {
                const d = document.createElement('div');
                d.className = "p-4 border-b text-slate-800 text-sm cursor-pointer hover:bg-blue-50 text-left";
                d.innerHTML = `<b>${i.marca} ${i.modelo}</b><br><span class="text-xs text-slate-400 font-mono text-left">IMEI: ${i.imei}</span>`;
                d.onclick = () => {
                    window.equipoVenta = i;
                    document.getElementById('detallesEquipo').innerHTML = `<div class="text-blue-900 uppercase">📦 <b>${i.marca} ${i.modelo}</b><br>IMEI: ${i.imei}</div>`;
                    document.getElementById('busqueda').value = i.modelo;
                    sug.innerHTML = "";
                };
                sug.appendChild(d);
            });
        }

        async function confirmarVenta() {
            const monto = document.getElementById('precioVenta').value;
            if(!window.equipoVenta || !monto) return alert("⚠️ Seleccione equipo y precio");
            const btn = document.getElementById('btnVenta');
            btn.disabled = true; btn.innerText = "PROCESANDO...";

            const datos = {
                accion: "registrarVenta",
                modelo: window.equipoVenta.modelo,
                imei: window.equipoVenta.imei,
                costo: window.equipoVenta.costo,
                precioUsd: monedaActual === 'USD' ? monto : (monto / window.tasaGlobal).toFixed(2),
                precioBs: monedaActual === 'BS' ? monto : (monto * window.tasaGlobal).toFixed(2),
                tasaUsada: window.tasaGlobal,
                vendedor: "Web"
            };

            try {
                document.getElementById('printFecha').innerText = new Date().toLocaleString();
                document.getElementById('printModelo').innerText = datos.modelo;
                document.getElementById('printImei').innerText = datos.imei;
                document.getElementById('printMonto').innerText = monto + " " + monedaActual;

                await fetch(urlScript, { method: 'POST', body: JSON.stringify(datos) });
                alert("✅ VENTA EXITOSA.");
                setTimeout(() => { window.print(); location.reload(); }, 800);
            } catch (e) {
                alert("✅ PROCESADO. Verifique su Excel.");
                location.reload();
            }
        }

        async function ejecutarCierre() {
            if(!confirm("¿Finalizar jornada? Se enviará reporte a Drive.")) return;
            const btn = document.getElementById('btnCierre');
            btn.disabled = true; btn.innerText = "CERRANDO CAJA...";
            try {
                await fetch(urlScript, { method: 'POST', body: JSON.stringify({ accion: "cierreCaja" }) });
                alert("✅ CIERRE GUARDADO EN DRIVE");
                location.reload();
            } catch (e) { location.reload(); }
        }

        function abrirVendedor() { document.getElementById('loginScreen').classList.add('hidden'); document.getElementById('vendedorView').classList.remove('hidden'); }
        
        function abrirJefe() { 
            const p = prompt("Clave:"); 
            if(p === "1234") { 
                document.getElementById('loginScreen').classList.add('hidden'); 
                document.getElementById('jefeView').classList.remove('hidden'); 
            } else { alert("Clave incorrecta"); }
        }

        async function guardarTasa() {
            const t = document.getElementById('nuevaTasa').value;
            if(!t) return;
            await fetch(urlScript, { method: 'POST', body: JSON.stringify({ accion: "actualizarTasa", tasa: t }) });
            alert("✅ Tasa Actualizada");
            location.reload();
        }

        async function cargarInventario() {
            const btn = document.getElementById('btnCargar');
            btn.disabled = true; btn.innerText = "SUBIENDO FOTO Y DATOS...";
            const d = {
                accion: "cargarStock",
                marca: document.getElementById('invMarca').value,
                modelo: document.getElementById('invModelo').value,
                imei: document.getElementById('invImei').value || "LOTE",
                costo: document.getElementById('invCosto').value,
                cantidad: document.getElementById('invCantidad').value,
                fotoB64: fotoBase64
            };
            try {
                await fetch(urlScript, { method: 'POST', body: JSON.stringify(d) });
                alert("✅ Stock y Foto registrados con éxito");
                location.reload();
            } catch (e) { location.reload(); }
        }
    </script>
</body>
</html>
